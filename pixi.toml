[workspace]
name = "brainsulcal"
version = "0.1.0"
description = "Champollion-conditioned BrainOmni for music brain response decoding"
channels = ["conda-forge", "pytorch"]
platforms = ["linux-64"]

[tasks]
# Setup
install-submodules = "git submodule update --init --recursive"
install-brainomni   = "pip install -e external/BrainOmni"
install-all         = { depends-on = ["install-submodules", "install-brainomni"] }

# Data
download-daly   = "python scripts/00_download_data.py --dataset daly"
download-musing = "python scripts/00_download_data.py --dataset musin_g"
download-all    = { depends-on = ["download-daly", "download-musing"] }

# Precompute (run once, results cached to data/processed/)
precompute-champollion = "python scripts/01_precompute_champollion.py"
precompute-brainomni   = "python scripts/02_precompute_brainomni.py"
precompute-all         = { depends-on = ["precompute-champollion", "precompute-brainomni"] }

# Training
train     = "python scripts/03_train.py"
evaluate  = "python scripts/04_evaluate.py"
visualize = "python scripts/05_visualize.py"

# Development
test      = "pytest tests/ -v"
test-fast = "pytest tests/ -v -x --tb=short"
test-cov  = "pytest tests/ -v --cov=brainsulcal --cov-report=html"
lint      = "ruff check brainsulcal/ tests/ scripts/"
typecheck = "mypy brainsulcal/"

[dependencies]
python = ">=3.10,<3.12"

# PyTorch (CPU build — use [feature.gpu] on CEA cluster)
pytorch = ">=2.1.0"
torchvision = "*"

# Scientific stack
numpy = ">=1.24"
pandas = ">=2.0"
scipy = ">=1.11"
h5py = ">=3.9"
nibabel = ">=5.0"
scikit-learn = ">=1.3"
matplotlib = ">=3.7"
seaborn = ">=0.13"

# MNE EEG processing
mne = ">=1.6.0"

[pypi-dependencies]
brainsulcal        = { path = ".", editable = true }
mne-bids           = ">=0.14"
openneuro-py       = "*"
nilearn            = ">=0.10"
einops             = ">=0.7"
timm               = ">=0.9"
huggingface-hub    = ">=0.20"
wandb              = ">=0.16"
hydra-core         = ">=1.3"
omegaconf          = ">=2.3"
tqdm               = "*"
umap-learn         = ">=0.5"

[feature.dev.pypi-dependencies]
pytest     = ">=7.0"
pytest-cov = "*"
ruff       = ">=0.1"
mypy       = ">=1.0"

[feature.dev.tasks]
test = "pytest tests/ -v"

# GPU feature: activate on CEA cluster with `pixi install --environment gpu`
# pytorch-cuda version must match the cluster's driver — check with `nvidia-smi`
[feature.gpu.dependencies]
pytorch-cuda = ">=12.1,<12.5"

[environments]
default = { features = [], solve-group = "default" }
dev     = { features = ["dev"], solve-group = "default" }
gpu     = { features = ["gpu"], solve-group = "gpu" }   # solved independently
